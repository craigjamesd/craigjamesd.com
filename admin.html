<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Manager — CJ Davitt</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f2f0ec;color:#1a1816;min-height:100vh;}
img{max-width:100%;display:block;}
:root{
  --ink:#1a1816;--white:#fff;--paper:#f2f0ec;--stone:#e4e2dc;
  --pebble:#b8b4ac;--drift:#7a7670;--anchor:#3a3834;
  --green:#2d6a4f;--green-bg:#d4edda;
  --red:#c0392b;--red-bg:#f8d7da;
  --amber:#856404;--amber-bg:#fff3cd;
  --blue:#0c5460;--blue-bg:#cce5ff;
  --radius:8px;
}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{background:var(--white);border:1px solid var(--stone);padding:48px 40px;max-width:360px;width:100%;text-align:center;}
.login-logo{font-family:'Georgia',serif;font-size:1.4rem;letter-spacing:.08em;margin-bottom:4px;}
.login-sub{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--pebble);margin-bottom:32px;}
.login-label{display:block;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--drift);margin-bottom:6px;text-align:left;}
.login-input{width:100%;border:1px solid var(--stone);background:var(--paper);padding:11px 14px;font-size:.95rem;margin-bottom:16px;outline:none;}
.login-input:focus{border-color:var(--ink);}
.login-btn{width:100%;background:var(--ink);color:var(--white);border:none;padding:13px;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;}
.login-err{color:var(--red);font-size:.8rem;margin-top:10px;display:none;}
/* LAYOUT */
.app{display:none;min-height:100vh;}
.topbar{background:var(--ink);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-brand{font-family:'Georgia',serif;font-size:1rem;color:rgba(255,255,255,.85);letter-spacing:.06em;}
.topbar-sub{font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:1px;}
.topbar-logout{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.35);cursor:pointer;border:1px solid rgba(255,255,255,.1);background:none;padding:6px 12px;}
.nav-tabs{background:var(--white);border-bottom:1px solid var(--stone);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:57px;z-index:99;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{font-size:.65rem;letter-spacing:.16em;text-transform:uppercase;color:var(--pebble);background:none;border:none;padding:14px 20px;cursor:pointer;position:relative;white-space:nowrap;transition:color .2s;}
.nav-tab::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--ink);transform:scaleX(0);transition:transform .2s;}
.nav-tab.active{color:var(--ink);}
.nav-tab.active::after{transform:scaleX(1);}
.panel{display:none;padding:20px;}
.panel.active{display:block;}
/* BADGES */
.badge{display:inline-block;font-size:.58rem;letter-spacing:.08em;padding:2px 8px;border-radius:100px;font-weight:500;white-space:nowrap;}
.badge-initiated{background:var(--amber-bg);color:var(--amber);}
.badge-responded{background:var(--blue-bg);color:var(--blue);}
.badge-negotiating{background:#e8d5ff;color:#6b21a8;}
.badge-sold{background:var(--green-bg);color:var(--green);}
.badge-closed,.badge-archived,.badge-hidden{background:var(--paper);color:var(--pebble);border:1px solid var(--stone);}
.badge-published{background:var(--green-bg);color:var(--green);}
.badge-draft{background:var(--amber-bg);color:var(--amber);}
.badge-available{background:var(--green-bg);color:var(--green);}
.badge-upcoming{background:var(--blue-bg);color:var(--blue);}
.badge-ongoing{background:var(--green-bg);color:var(--green);}
.badge-completed{background:var(--paper);color:var(--pebble);border:1px solid var(--stone);}
.badge-hero{background:#162535;color:#fff;}
.badge-featured{background:#1a3a35;color:#fff;}
.badge-gallery{background:#2d5a52;color:#fff;}
.badge-comm{background:#5a3a1a;color:#fff;}
.badge-artist{background:#4a2060;color:#fff;}
/* SLOT SUMMARY */
.slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.slot-item{background:var(--white);border:1px solid var(--stone);border-radius:var(--radius);padding:8px 10px;}
.slot-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.slot-label{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--pebble);}
.slot-count{font-size:.75rem;font-weight:500;}
.slot-bar{height:3px;background:var(--stone);border-radius:2px;overflow:hidden;}
.slot-fill{height:100%;transition:width .3s;}
/* WORKS GRID */
.works-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.work-card{background:var(--white);border:1px solid var(--stone);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:box-shadow .2s;}
.work-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1);}
.work-img{width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--paper);display:block;}
.work-img-placeholder{width:100%;aspect-ratio:4/3;background:var(--paper);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--pebble);}
.work-body{padding:10px;}
.work-title{font-size:.88rem;font-weight:500;color:var(--ink);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.work-medium{font-size:.7rem;color:var(--drift);margin-bottom:6px;}
.work-badges{display:flex;gap:4px;flex-wrap:wrap;}
/* INQUIRY CARDS */
.inq-card{background:var(--white);border:1px solid var(--stone);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.inq-header{padding:14px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;}
.inq-meta{flex:1;min-width:0;}
.inq-name{font-size:.92rem;font-weight:500;margin-bottom:2px;}
.inq-painting{font-size:.76rem;color:var(--drift);margin-bottom:4px;}
.inq-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.inq-date{font-size:.63rem;color:var(--pebble);}
.inq-chevron{color:var(--pebble);font-size:.8rem;flex-shrink:0;transition:transform .2s;}
.inq-card.open .inq-chevron{transform:rotate(180deg);}
.inq-body{display:none;padding:0 16px 16px;border-top:1px solid var(--stone);}
.inq-card.open .inq-body{display:block;}
.inq-message{font-size:.82rem;color:var(--drift);line-height:1.7;background:var(--paper);padding:12px;border-radius:4px;margin:12px 0;}
.inq-contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.inq-contact-item strong{display:block;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--pebble);margin-bottom:2px;font-weight:400;}
.inq-contact-item{font-size:.75rem;color:var(--drift);}
/* EVENTS */
.event-item{background:var(--white);border:1px solid var(--stone);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;}
.event-date-block{background:var(--ink);color:var(--white);padding:8px 12px;border-radius:4px;text-align:center;flex-shrink:0;min-width:52px;}
.event-date-day{font-size:1.2rem;font-weight:600;line-height:1;}
.event-date-mon{font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;opacity:.6;}
.event-info{flex:1;min-width:0;}
.event-name{font-size:.9rem;font-weight:500;margin-bottom:2px;}
.event-venue{font-size:.76rem;color:var(--drift);margin-bottom:5px;}
.event-actions{display:flex;gap:6px;flex-shrink:0;}
/* FORMS */
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--drift);margin-bottom:5px;}
.form-label small{font-size:.56rem;color:var(--pebble);letter-spacing:.06em;text-transform:none;}
.form-input,.form-select,.form-textarea{width:100%;border:1px solid var(--stone);background:var(--paper);padding:10px 12px;font-size:.9rem;color:var(--ink);outline:none;border-radius:4px;font-family:inherit;transition:border-color .2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--ink);}
.form-textarea{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-actions{display:flex;gap:10px;margin-top:16px;align-items:center;}
.slots-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
/* BUTTONS */
.btn{font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;padding:10px 20px;border:none;cursor:pointer;transition:background .2s;border-radius:4px;}
.btn-primary{background:var(--ink);color:var(--white);}
.btn-primary:hover{background:#2c2c2a;}
.btn-secondary{background:var(--paper);color:var(--anchor);border:1px solid var(--stone);}
.btn-secondary:hover{background:var(--stone);}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid #f5c6cb;}
.btn-sm{padding:7px 14px;font-size:.58rem;}
.btn-block{width:100%;text-align:center;display:block;}
/* PHOTO PICKER */
.photo-preview{display:none;position:relative;margin-bottom:10px;}
.photo-preview img{width:100%;max-height:220px;object-fit:cover;border-radius:6px;display:block;}
.photo-clear{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:30px;height:30px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.photo-uploading{display:none;align-items:center;gap:10px;padding:12px;background:var(--paper);border:1px solid var(--stone);border-radius:6px;margin-bottom:10px;font-size:.8rem;color:var(--drift);}
.photo-uploading.active{display:flex;}
/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--white);width:100%;max-width:600px;max-height:92vh;overflow-y:auto;border-radius:12px 12px 0 0;padding:24px 20px 40px;}
.modal-handle{width:36px;height:4px;background:var(--stone);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-size:1rem;font-weight:500;color:var(--ink);margin-bottom:20px;}
@media(min-width:600px){.modal-backdrop{align-items:center;}.modal{border-radius:12px;}}
/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-chip{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;padding:7px 14px;border:1px solid var(--stone);background:var(--white);color:var(--pebble);cursor:pointer;border-radius:100px;white-space:nowrap;transition:all .2s;}
.filter-chip.active{background:var(--ink);color:var(--white);border-color:var(--ink);}
/* LOADING / TOAST */
.loading{text-align:center;padding:40px;color:var(--pebble);font-size:.82rem;}
.spinner{width:22px;height:22px;border:2px solid var(--stone);border-top-color:var(--ink);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--white);padding:11px 22px;border-radius:100px;font-size:.78rem;z-index:400;transition:transform .3s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.section-label{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--pebble);padding-bottom:10px;border-bottom:1px solid var(--stone);margin-bottom:12px;}
@media(min-width:600px){.works-grid{grid-template-columns:repeat(3,1fr);}.panel{padding:24px;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">CJ Davitt</div>
    <div class="login-sub">Studio Manager</div>
    <label class="login-label">Password</label>
    <input type="password" class="login-input" id="passwordInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()"/>
    <button class="login-btn" onclick="login()">Sign In</button>
    <div class="login-err" id="loginErr">Incorrect password</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <div><div class="topbar-brand">CJ Davitt</div><div class="topbar-sub">Studio Manager</div></div>
    <button class="topbar-logout" onclick="logout()">Sign Out</button>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPanel('inquiries',this)">Inquiries</button>
    <button class="nav-tab" onclick="showPanel('works',this)">Works</button>
    <button class="nav-tab" onclick="showPanel('events',this)">Events</button>
  </div>

  <!-- INQUIRIES -->
  <div class="panel active" id="panel-inquiries">
    <div class="filter-bar">
      <button class="filter-chip active" onclick="filterInq('all',this)">All</button>
      <button class="filter-chip" onclick="filterInq('Initiated',this)">Initiated</button>
      <button class="filter-chip" onclick="filterInq('Responded',this)">Responded</button>
      <button class="filter-chip" onclick="filterInq('Negotiating',this)">Negotiating</button>
      <button class="filter-chip" onclick="filterInq('Sold',this)">Sold</button>
      <button class="filter-chip" onclick="filterInq('Closed',this)">Closed</button>
    </div>
    <div id="inqList"><div class="loading"><div class="spinner"></div>Loading…</div></div>
  </div>

  <!-- WORKS -->
  <div class="panel" id="panel-works">
    <button class="btn btn-primary btn-block" style="margin-bottom:12px;" onclick="openAddWork()">+ Add New Painting</button>
    <div class="slot-grid" id="slotSummary"></div>
    <div class="filter-bar">
      <button class="filter-chip active" onclick="filterWorks('all',this)">All</button>
      <button class="filter-chip" onclick="filterWorks('Published',this)">Published</button>
      <button class="filter-chip" onclick="filterWorks('Draft',this)">Draft</button>
      <button class="filter-chip" onclick="filterWorks('Hidden',this)">Hidden</button>
      <button class="filter-chip" onclick="filterWorks('Sold',this)">Sold</button>
    </div>
    <div class="works-grid" id="worksList"><div class="loading"><div class="spinner"></div>Loading…</div></div>
  </div>

  <!-- EVENTS -->
  <div class="panel" id="panel-events">
    <button class="btn btn-primary btn-block" style="margin-bottom:16px;" onclick="openAddEvent()">+ Add Event / Appearance</button>
    <div class="filter-bar">
      <button class="filter-chip active" onclick="filterEvents('all',this)">All</button>
      <button class="filter-chip" onclick="filterEvents('Upcoming',this)">Upcoming</button>
      <button class="filter-chip" onclick="filterEvents('Ongoing',this)">Ongoing</button>
      <button class="filter-chip" onclick="filterEvents('Completed',this)">Completed</button>
    </div>
    <div id="eventsList"><div class="loading"><div class="spinner"></div>Loading…</div></div>
  </div>
</div>

<!-- INQUIRY MODAL -->
<div class="modal-backdrop" id="inqModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="inqModalTitle">Inquiry</div>
    <input type="hidden" id="inqEditId"/>
    <div class="form-group">
      <label class="form-label">Status</label>
      <select class="form-select" id="inqEditStatus">
        <option>Initiated</option><option>Responded</option><option>Negotiating</option>
        <option>Sold</option><option>Closed</option><option>No Response</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="inqEditNotes" placeholder="Internal notes…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Follow Up Date</label>
      <input type="date" class="form-input" id="inqEditFollowUp"/>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveInquiry()">Save</button>
      <button class="btn btn-secondary" onclick="closeModal('inqModal')">Cancel</button>
    </div>
  </div>
</div>

<!-- WORK MODAL -->
<div class="modal-backdrop" id="workModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="workModalTitle">Add Painting</div>
    <input type="hidden" id="wId"/>

    <!-- PHOTO -->
    <div class="form-group">
      <label class="form-label">Photo</label>
      <div class="photo-preview" id="photoPreview">
        <img id="photoPreviewImg" src="" alt=""/>
        <button class="photo-clear" onclick="clearPhoto()">✕</button>
      </div>
      <div class="photo-uploading" id="photoUploading">
        <div class="spinner" style="width:18px;height:18px;flex-shrink:0;"></div>
        <span>Uploading to image server…</span>
      </div>
      <input type="file" id="photoInput" accept="image/*" style="display:none;" onchange="handlePhotoSelect(event)"/>
      <button class="btn btn-secondary btn-block" onclick="document.getElementById('photoInput').click()">📷 Select Photo / Camera Roll</button>
      <input type="hidden" id="wImageUrl"/>
    </div>

    <div class="form-group">
      <label class="form-label">Title *</label>
      <input type="text" class="form-input" id="wTitle" placeholder="e.g. Six Bobbers"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Medium</label>
        <select class="form-select" id="wMedium">
          <option value="">Select…</option>
          <option>Oil on Canvas</option><option>Oil on Panel</option>
          <option>Colored Pencil</option><option>Mixed Media</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-select" id="wCategory">
          <option value="">Select…</option>
          <option>Bobbers & Tackle</option><option>Seascapes</option>
          <option>Marine Life</option><option>Figures</option>
          <option>Landscapes</option><option>Other</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Width (in)</label>
        <input type="number" class="form-input" id="wWidth" placeholder="24"/>
      </div>
      <div class="form-group">
        <label class="form-label">Height (in)</label>
        <input type="number" class="form-input" id="wHeight" placeholder="36"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Availability</label>
        <select class="form-select" id="wAvailability" onchange="toggleSoldFields(this.value)">
          <option>Available</option><option>In Progress</option><option>At Gallery</option>
          <option>Reserved</option><option>Sold</option><option>Archived</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Gallery Location</label>
        <select class="form-select" id="wGallery">
          <option>Studio</option><option>Frederick Gallery</option>
          <option>Autumn Elise</option><option>Noon Designs</option><option>N/A</option>
        </select>
      </div>
    </div>

    <!-- SITE PLACEMENT -->
    <div style="border-top:1px solid var(--stone);padding-top:14px;margin-top:2px;margin-bottom:14px;">
      <div class="section-label">Site Visibility & Placement</div>
      <div class="form-group">
        <label class="form-label">Visibility</label>
        <select class="form-select" id="wVisibility">
          <option>Draft</option><option>Published</option><option>Hidden</option>
        </select>
      </div>
      <div class="slots-grid">
        <div class="form-group">
          <label class="form-label">Hero Image <small>(max 1 — home page)</small></label>
          <select class="form-select" id="wHeroImage">
            <option value="No">No</option><option value="Yes">Yes</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Featured <small>(max 3 — works page)</small></label>
          <select class="form-select" id="wFeatured">
            <option value="No">No</option><option value="Yes">Yes</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Gallery <small>(max 9 — more works)</small></label>
          <select class="form-select" id="wShowInGallery">
            <option value="No">No</option><option value="Yes">Yes</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Commissions <small>(max 4 — commissions page)</small></label>
          <select class="form-select" id="wShowOnCommissions">
            <option value="No">No</option><option value="Yes">Yes</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Artist Photo <small>(max 1 — about section)</small></label>
          <select class="form-select" id="wArtistPhoto">
            <option value="No">No</option><option value="Yes">Yes</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Asking Price ($)</label>
        <input type="number" class="form-input" id="wAskingPrice" placeholder="2400"/>
      </div>
      <div class="form-group">
        <label class="form-label">Date Completed</label>
        <input type="month" class="form-input" id="wDateCompleted"/>
      </div>
    </div>

    <!-- SOLD FIELDS -->
    <div id="soldFields" style="display:none;border-top:1px solid var(--stone);padding-top:14px;margin-top:2px;">
      <div class="section-label">Sold Details</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Final Sold Price ($)</label>
          <input type="number" class="form-input" id="wSoldPrice"/>
        </div>
        <div class="form-group">
          <label class="form-label">Date Sold</label>
          <input type="date" class="form-input" id="wDateSold"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Collector Name</label>
          <input type="text" class="form-input" id="wCollectorName"/>
        </div>
        <div class="form-group">
          <label class="form-label">Collector Email</label>
          <input type="email" class="form-input" id="wCollectorEmail"/>

// ── IMAGE UPLOAD TO IMGBB ──
// Images go directly from browser to ImgBB — no Apps Script involved
// Returns a permanent public URL safe to use in <img> tags
async function uploadToImgBB(base64Data) {
  const formData = new FormData();
  formData.append('key', IMGBB_KEY);
  formData.append('image', base64Data);
  const res = await fetch('https://api.imgbb.com/1/upload', {
    method: 'POST',
    body: formData
  });
  const d = await res.json();
  if (d.success) return d.data.url;
  throw new Error(d.error?.message || 'ImgBB upload failed');
}

function compressImage(file, maxPx = 1400, quality = 0.85) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        // Correct EXIF orientation
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        // Return base64 without the data: prefix
        resolve(canvas.toDataURL('image/jpeg', quality).split(',')[1]);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

    const color = count >= s.max ? 'var(--red)' : count > 0 ? 'var(--green)' : 'var(--stone)';
    const countColor = count >= s.max ? 'var(--red)' : 'var(--ink)';
    return `<div class="slot-item">
      <div class="slot-header">

let pendingImageUrl = null; // final ImgBB URL after upload

function handlePhotoSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  // Show uploading state immediately
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('photoUploading').classList.add('active');

  compressImage(file).then(base64 => {
    // Show preview while uploading
    document.getElementById('photoPreviewImg').src = 'data:image/jpeg;base64,' + base64;
    document.getElementById('photoPreview').style.display = 'block';
    // Upload to ImgBB
    return uploadToImgBB(base64);
  }).then(url => {
    pendingImageUrl = url;
    document.getElementById('wImageUrl').value = url;
    document.getElementById('photoUploading').classList.remove('active');
    showToast('Photo uploaded ✓');
  }).catch(err => {
    document.getElementById('photoUploading').classList.remove('active');
    document.getElementById('photoPreview').style.display = 'none';
    alert('Photo upload failed: ' + err.message);
  });
}

async function saveWork() {
  const title = document.getElementById('wTitle').value.trim();
  if (!title) { alert('Title is required.'); return; }
  const uploading = document.getElementById('photoUploading').classList.contains('active');
  if (uploading) { alert('Photo is still uploading — please wait.'); return; }

  const btn = document.getElementById('saveWorkBtn');
  btn.textContent = 'Saving…'; btn.disabled = true;

  try {
    const payload = {
      id: document.getElementById('wId').value || null,
      title,
      imageUrl: document.getElementById('wImageUrl').value || '',
      medium: document.getElementById('wMedium').value,
      category: document.getElementById('wCategory').value,
      width: document.getElementById('wWidth').value,
      height: document.getElementById('wHeight').value,
      availability: document.getElementById('wAvailability').value,
      galleryLocation: document.getElementById('wGallery').value,
      visibility: document.getElementById('wVisibility').value,
      heroImage: document.getElementById('wHeroImage').value,
      featured: document.getElementById('wFeatured').value,
      showInGallery: document.getElementById('wShowInGallery').value,
      showOnCommissions: document.getElementById('wShowOnCommissions').value,
      artistPhoto: document.getElementById('wArtistPhoto').value,
      askingPrice: document.getElementById('wAskingPrice').value,
      dateCompleted: document.getElementById('wDateCompleted').value,
      notes: document.getElementById('wNotes').value,
      finalSoldPrice: document.getElementById('wSoldPrice').value,
      dateSold: document.getElementById('wDateSold').value,
      collectorName: document.getElementById('wCollectorName').value,
      collectorEmail: document.getElementById('wCollectorEmail').value,
    };
    const action = payload.id ? 'update_work' : 'add_work';
    const res = await api(action, payload);
    if (res.success) {
      closeModal('workModal');
      loadWorks();
      showToast(payload.id ? 'Painting updated ✓' : 'Painting added ✓');
    } else {
      alert(res.error || 'Save failed');
    }
  } catch(e) { alert('Error: ' + e.message); }
  btn.textContent = 'Save Painting'; btn.disabled = false;
}

async function deleteWork() {

}

  document.getElementById('evState').value   = ev['State'] || '';
  document.getElementById('evStartDate').value = ev['Start Date'] ? ev['Start Date'].substring(0,10) : '';
  document.getElementById('evEndDate').value   = ev['End Date'] ? ev['End Date'].substring(0,10) : '';
  document.getElementById('evDesc').value    = ev['Description'] || '';
  document.getElementById('evWebsite').value = ev['Website'] || '';
  openModal('eventModal');
}

async function saveEvent() {
  const name = document.getElementById('evName').value.trim();
  if (!name) { alert('Event name is required.'); return; }
  const btn = document.getElementById('saveEventBtn');
  btn.textContent = 'Saving…'; btn.disabled = true;
  try {
    const id = document.getElementById('evId').value;
    const payload = {
      id: id || null,
      eventName: name,
      eventType: document.getElementById('evType').value,
      status: document.getElementById('evStatus').value,
      venueName: document.getElementById('evVenue').value,
      city: document.getElementById('evCity').value,
      state: document.getElementById('evState').value,
      startDate: document.getElementById('evStartDate').value,
      endDate: document.getElementById('evEndDate').value,
      description: document.getElementById('evDesc').value,
      website: document.getElementById('evWebsite').value,
      showOnSite: 'Yes'
    };
    const action = id ? 'update_event' : 'add_event';
    const res = await api(action, payload);
    if (res.success) {
      closeModal('eventModal');
      loadEvents();
      showToast(id ? 'Event updated ✓' : 'Event added ✓');
    } else {
      alert(res.error || 'Save failed');
    }
  } catch(e) { alert('Error: ' + e.message); }
  btn.textContent = 'Save Event'; btn.disabled = false;
}

async function deleteEvent() {
  const id = document.getElementById('evId').value;
  if (!id || !confirm('Delete this event?')) return;
  const res = await api('delete_event', { id });
  if (res.success) { closeModal('eventModal'); loadEvents(); showToast('Event deleted'); }
  else alert(res.error || 'Delete failed');
}
</script>
</body>
</html>
